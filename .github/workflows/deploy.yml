name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - run: go mod download
      - run: go test -v ./...
      - run: go build -o /dev/null ./...

  deploy-info:
    name: Deploy
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - run: |
          echo "✅ Tests passed!"
          echo "🚀 Auto-deploy watcher picks up changes within 30 seconds"
          echo "📦 VM: zuhudo (100.100.10.109)"
          echo "🌐 API: https://api.zuhudo.cc.cd"
